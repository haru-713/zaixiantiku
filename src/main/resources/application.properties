spring.application.name=zaixiantiku
server.port=8080

# 数据库配置
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/zaixiantiku?serverTimezone=UTC&useUnicode=true&characterEncoding=utf-8
spring.datasource.username=root
spring.datasource.password=123456

# MyBatis Plus 配置
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.configuration.map-underscore-to-camel-case=true

# Swagger 配置
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Redis 配置 (示例)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

# 编码设置
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true

# 控制台日志编码 (Windows 环境如果 chcp 65001 无效，可以改为 GBK 观察)
logging.charset.console=GBK
logging.level.com.example.zaixiantiku=debug

