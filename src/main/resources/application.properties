spring.application.name=zaixiantiku
server.port=8080

# 数据库配置
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/zaixiantiku?serverTimezone=UTC&useUnicode=true&characterEncoding=utf-8
spring.datasource.username=root
spring.datasource.password=123456

# MyBatis Plus 配置
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.configuration.map-underscore-to-camel-case=true

# Swagger 配置
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Redis 配置 (示例)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

# 编码设置
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true

# 控制台日志编码 (Windows 环境如果 chcp 65001 无效，可以改为 GBK 观察)
logging.charset.console=GBK
logging.level.com.example.zaixiantiku=debug

# OSS 配置（建议使用环境变量注入，不要硬编码密钥）
aliyun.oss.endpoint=${ALIYUN_OSS_ENDPOINT:}
aliyun.oss.accessKeyId=${ALIYUN_OSS_ACCESS_KEY_ID:}
aliyun.oss.accessKeySecret=${ALIYUN_OSS_ACCESS_KEY_SECRET:}
aliyun.oss.bucketName=${ALIYUN_OSS_BUCKET:}
aliyun.oss.publicBaseUrl=${ALIYUN_OSS_PUBLIC_BASE_URL:}
aliyun.oss.avatarDir=avatar
aliyun.oss.courseCoverDir=course-cover

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
